name: instrutor_legal_instrutor
description: Aplicativo oficial do Instrutor Legal para Instrutores - Gerencie suas aulas, alunos e agenda.
publish_to: 'none'
version: 1.0.0+8

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI e Design
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.0
  percent_indicator: ^4.2.3
  badges: ^3.1.2

  # Navegação e Rotas
  go_router: ^13.0.0

  # Gerenciamento de Estado
  provider: ^6.1.1

  # HTTP e API
  http: ^1.1.2

  # Armazenamento Local
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Formulários e Validação
  mask_text_input_formatter: ^2.9.0

  # Imagens e Câmera
  image_picker: ^1.0.7

  # Localização
  geolocator: ^11.0.0
  geocoding: ^2.1.1
  url_launcher: ^6.2.2

  # Notificações
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^18.0.0

  # Utils
  intl: any
  connectivity_plus: ^5.0.2
  package_info_plus: ^5.0.1
  permission_handler: ^11.2.0

  # Animações
  flutter_animate: ^4.3.0
  lottie: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.9

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#E8F5E9"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

flutter_native_splash:
  color: "#F5FBF8"
  image: assets/images/splash_logo.png
  color_dark: "#1a1a2e"
  image_dark: assets/images/splash_logo.png
  android_12:
    color: "#F5FBF8"
    icon_background_color: "#00A859"
    image: assets/images/splash_logo.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
